<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Cliente - Bodega</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="page-client">
  <header class="header">
    <div class="container header-inner">
      <div>
        <h1>Consulta y compra simulada</h1>
        <p class="muted">Consulta productos disponibles y su ubicación en bodega.</p>
      </div>
      <div class="toolbar-actions">
        <span id="currentClient" class="muted"></span>
        <button class="btn danger" id="logoutClientBtn">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="clientSummaryCards" class="summary-grid" style="padding-top:1.25rem;"></div>
    <div class="client-layout">
      <section class="card panel">
        <h2>Productos</h2>
        <div class="filters">
          <input id="clientSearchInput" type="text" placeholder="Buscar por código, nombre o ubicación" />
          <select id="clientCategoryFilter"></select>
          <select id="clientBodegaFilter"></select>
        </div>
        <div id="productGrid" class="product-grid"></div>
      </section>

      <aside class="card panel">
        <h2>Carrito</h2>
        <div id="cartList"></div>
        <div class="cart-total">
          <strong>Total</strong>
          <strong id="cartTotal"></strong>
        </div>
        <div class="actions" style="margin-top:1rem;">
          <button class="btn" id="checkoutBtn">Confirmar compra</button>
        </div>
        <div id="clientMessage" class="message info" hidden></div>
      </aside>
    </div>
  </main>

  <script src="./js/storage.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/movimientos.js"></script>
  <script src="./js/productos.js"></script>
  <script src="./js/compras.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/cliente.js"></script>
</body>
</html>
